<!doctype html>
<html>
    <head>
        <meta charset="utf-8">
        <link rel="preload" href="forced_square.woff2" as="font" type="font/woff2" crossorigin="anonymous"/>
        <link rel="preload" href="images/logo.svg" as="image" type="image/svg+xml"/>
        <link rel="preload" href="images/discord.svg" as="image" type="image/svg+xml"/>
        <link rel="manifest" href="manifest.json"/>
        <meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,viewport-fit=cover,user-scalable=no">
        <script>
            // Usernames listed here are hidden from track leaderboards on this device/browser only.
            // Match is case-insensitive and ignores leading/trailing whitespace.
            window.__nswsLeaderboardBanlist = [
                "WebMaster",
                "PWABHRRSTAL",
                "You Fools (pc) ghostless"
            ];
        </script>
        <script>
            // If any nickname saved on this device/browser matches the banlist above,
            // halt page load entirely and show a blank white screen instead of the site.
            (function () {
                try {
                    var banlist = (window.__nswsLeaderboardBanlist || []).map(function (n) {
                        return String(n).trim().toLowerCase();
                    });
                    if (!banlist.length) return;
                    var keys = Object.keys(window.localStorage);
                    for (var i = 0; i < keys.length; i++) {
                        var key = keys[i];
                        if (!/_user_\d+$/.test(key)) continue;
                        try {
                            var profile = JSON.parse(window.localStorage.getItem(key));
                            var nick = profile && typeof profile.nickname === "string" ? profile.nickname.trim().toLowerCase() : null;
                            if (nick && banlist.indexOf(nick) !== -1) {
                                document.open();
                                document.write("<!doctype html><html><head><meta charset='utf-8'></head><body style='margin:0;background:#fff;'></body></html>");
                                document.close();
                                if (window.stop) window.stop();
                                break;
                            }
                        } catch (e) {}
                    }
                } catch (e) {}
            })();
        </script>
        <script src="https://cdn.jsdelivr.net/npm/disable-devtool@0.3.9"></script>
        <script>
            DisableDevtool({
                ondevtoolopen: () => {
                    document.body.innerHTML = "<h1 style='color:#fff;text-align:center;margin-top:20vh;font-family:sans-serif;'>Developer tools are disabled.</h1>";
                }
            });
        </script>
        <script defer="defer" src="error_screen.bundle.js"></script>
        <script defer="defer" src="main.bundle.js"></script>
    </head>
    <body>
        <canvas id="screen"></canvas>
        <div id="ui"></div>
        <div id="transition-layer"></div>
    </body>
</html>
